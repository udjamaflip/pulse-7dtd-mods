鬠ｿ{% extends "base.html" %}
{% block title %}New Modifier{% endblock %}

{% block head %}
<style>
  /* ﾃ｢窶昶ぎﾃ｢窶昶ぎ Toolbar ﾃ｢窶昶ぎﾃ｢窶昶ぎ */
  .mod-toolbar {
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap; margin-bottom: 18px;
  }
  .mod-search {
    flex: 1; min-width: 200px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius-sm);
    padding: 7px 12px; font-size: 13px;
    outline: none;
  }
  .mod-search:focus { border-color: var(--accent); }
  .mod-search::placeholder { color: var(--text-muted); }

  /* ﾃ｢窶昶ぎﾃ｢窶昶ぎ Category pills ﾃ｢窶昶ぎﾃ｢窶昶ぎ */
  .cat-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .cat-pill {
    padding: 4px 12px; border-radius: 20px; font-size: 12px;
    font-weight: 600; cursor: pointer; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text-muted);
    transition: all .15s; user-select: none;
  }
  .cat-pill:hover { border-color: var(--accent); color: var(--accent); }
  .cat-pill.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

  /* ﾃ｢窶昶ぎﾃ｢窶昶ぎ Game version badge ﾃ｢窶昶ぎﾃ｢窶昶ぎ */
  .ver-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px;
    font-size: 11.5px; color: var(--text-muted);
    white-space: nowrap;
  }

  /* ﾃ｢窶昶ぎﾃ｢窶昶ぎ Count indicator ﾃ｢窶昶ぎﾃ｢窶昶ぎ */
  .mod-count { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }

  /* ﾃ｢窶昶ぎﾃ｢窶昶ぎ Card grid ﾃ｢窶昶ぎﾃ｢窶昶ぎ */
  .mod-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }
  .mod-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    cursor: pointer; transition: border-color .15s, background .15s;
  }
  .mod-card:hover { border-color: var(--accent); background: var(--surface2); }
  .mod-card.selected {
    border-color: var(--accent);
    background: var(--accent-bg);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .mod-card-cat {
    font-size: 10.5px; font-weight: 700; letter-spacing: .07em;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 6px;
  }
  .mod-card-label {
    font-size: 13.5px; font-weight: 600; color: var(--text);
    line-height: 1.3; margin-bottom: 6px;
  }
  .mod-card-desc {
    font-size: 12px; color: var(--text-muted); line-height: 1.4;
    margin-bottom: 8px;
  }
  .mod-card-target {
    font-size: 11px; font-family: monospace;
    color: var(--text-muted); background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 7px;
    display: inline-block;
  }
  .mod-card.hidden { display: none; }

  /* ﾃ｢窶昶ぎﾃ｢窶昶ぎ No results ﾃ｢窶昶ぎﾃ｢窶昶ぎ */
  .no-results {
    grid-column: 1 / -1;
    text-align: center; color: var(--text-muted);
    padding: 40px 0; font-size: 13px;
    display: none;
  }

  /* ﾃ｢窶昶ぎﾃ｢窶昶ぎ Selected modifier detail ﾃ｢窶昶ぎﾃ｢窶昶ぎ */
  .mod-detail { display: none; }
  .mod-detail.visible { display: block; }
  .mod-detail-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 18px; gap: 12px;
  }
  .mod-detail-title { font-size: 16px; font-weight: 700; }
  .mod-detail-meta {
    font-size: 11.5px; color: var(--text-muted); margin-top: 4px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .mod-detail-dismiss {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    border-radius: var(--radius-sm); padding: 4px 10px;
    cursor: pointer; font-size: 12px; white-space: nowrap; flex-shrink: 0;
  }
  .mod-detail-dismiss:hover { border-color: var(--accent); color: var(--accent); }

  .vanilla-pill {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 8px;
    font-size: 11px; font-family: monospace; color: var(--text-muted);
  }
  .field-hint { font-size: 11.5px; color: var(--text-muted); margin-top: 4px; }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">New Modifier</h1>
    <p class="page-sub">Tweak existing game values with a targeted XML patch.</p>
  </div>
  <a class="btn" href="/create"><i data-lucide="arrow-left" style="width:14px;height:14px;"></i>Back</a>
</div>

<!-- ﾃ｢窶昶ぎﾃ｢窶昶ぎ Toolbar ﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎ -->
<div class="mod-toolbar">
  <input class="mod-search" type="search" id="modSearch"
         placeholder="Search modifiersﾃ｢竄ｬﾂｦ" autocomplete="off" spellcheck="false">
  <div class="cat-pills" id="catPills">
    <span class="cat-pill active" data-cat="">All</span>
  </div>
  <span class="ver-badge">
    <i data-lucide="git-branch" style="width:12px;height:12px;"></i>
    7 Days to Die v2.5 (b32)
  </span>
</div>

<div class="mod-count" id="modCount"></div>

<!-- ﾃ｢窶昶ぎﾃ｢窶昶ぎ Card grid ﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎ -->
<div class="mod-grid" id="modGrid">
  <div class="no-results" id="noResults">No modifiers match your search.</div>
</div>

<!-- ﾃ｢窶昶ぎﾃ｢窶昶ぎ Selected modifier form ﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎ  -->
<div class="mod-detail" id="modDetail">
  <div class="card">
    <div class="mod-detail-header">
      <div>
        <div class="mod-detail-title" id="detailTitle"></div>
        <div class="mod-detail-meta">
          <span id="detailCat" class="ver-badge" style="padding:2px 9px;font-size:11px;"></span>
          <code id="detailTarget" style="font-size:11.5px;"></code>
        </div>
      </div>
      <button type="button" class="mod-detail-dismiss" id="dismissDetail">
        <i data-lucide="x" style="width:12px;height:12px;vertical-align:middle;"></i> Clear
      </button>
    </div>

    <form method="post" action="/create/modifier" id="modForm">
      <input type="hidden" name="modifier_id" id="modifierId">
      <input type="hidden" name="game_version" value="v2_5">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">

        <!-- Value -->
        <div class="field" style="grid-column:1">
          <label>Value <span style="color:var(--accent)">*</span></label>
          <div style="display:flex;align-items:center;gap:8px;">
            <input type="text" name="value" id="modValue"
                   style="flex:1;" required
                   placeholder="Enter a value">
            <span class="vanilla-pill" id="vanillaPill" title="Vanilla default">
              vanilla: <span id="vanillaVal"></span>
            </span>
          </div>
          <div class="field-hint" id="valueHint"></div>
        </div>

        <!-- Mod name -->
        <div class="field" style="grid-column:2">
          <label>Mod Name <span style="color:var(--accent)">*</span></label>
          <input type="text" name="display_name" id="modDisplayName"
                 placeholder="e.g. Double Solar Output" required>
        </div>

        <!-- Description -->
        <div class="field" style="grid-column:1/-1">
          <label>Description <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
          <textarea name="description" id="modDescription" rows="2"
                    placeholder="Brief description included in the READMEﾃ｢竄ｬﾂｦ"></textarea>
        </div>

      </div>

      <div style="margin-top:18px;">
        <button class="btn btn-primary" type="submit">
          <i data-lucide="download" style="width:13px;height:13px;"></i>
          Generate &amp; Download
        </button>
      </div>
    </form>
  </div>
</div>

<script>
(function () {
  var MODIFIERS = {{ modifiers_json | safe }};

  // ﾃ｢窶昶ぎﾃ｢窶昶ぎ Build category pills ﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎ
  var seen = {};
  var categories = [];
  MODIFIERS.forEach(function(m) {
    if (!seen[m.category]) { seen[m.category] = true; categories.push(m.category); }
  });
  var pillsEl = document.getElementById('catPills');
  categories.forEach(function(cat) {
    var pill = document.createElement('span');
    pill.className = 'cat-pill';
    pill.dataset.cat = cat;
    pill.textContent = cat;
    pillsEl.appendChild(pill);
  });

  // ﾃ｢窶昶ぎﾃ｢窶昶ぎ Build cards ﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎ
  var grid = document.getElementById('modGrid');
  var noResults = document.getElementById('noResults');
  var cards = [];

  MODIFIERS.forEach(function(m) {
    var card = document.createElement('div');
    card.className = 'mod-card';
    card.dataset.id = m.id;
    card.dataset.cat = m.category;

    var blob = [
      m.label, m.description || '', m.category,
      m.property_name, m.target_name, m.xml_file
    ].concat(m.search_tags || []).join(' ').toLowerCase();
    card.dataset.search = blob;

    card.innerHTML =
      '<div class="mod-card-cat">' + escHtml(m.category) + '</div>' +
      '<div class="mod-card-label">' + escHtml(m.label) + '</div>' +
      '<div class="mod-card-desc">' + escHtml(m.description || '') + '</div>' +
      '<span class="mod-card-target">' +
        escHtml(m.target_name) + '.' + escHtml(m.property_name) +
        ' &middot; ' + escHtml(m.xml_file) +
      '</span>';

    card.addEventListener('click', function() { selectModifier(m, card); });
    grid.insertBefore(card, noResults);
    cards.push(card);
  });

  updateCount();

  // ﾃ｢窶昶ぎﾃ｢窶昶ぎ Search + filter ﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎ
  var activeCat = '';
  var searchTerm = '';

  document.getElementById('modSearch').addEventListener('input', function(e) {
    searchTerm = e.target.value.trim().toLowerCase();
    applyFilter();
  });

  pillsEl.addEventListener('click', function(e) {
    var pill = e.target.closest ? e.target.closest('.cat-pill') : null;
    if (!pill && e.target.classList.contains('cat-pill')) pill = e.target;
    if (!pill) return;
    var allPills = pillsEl.querySelectorAll('.cat-pill');
    for (var i = 0; i < allPills.length; i++) allPills[i].classList.remove('active');
    pill.classList.add('active');
    activeCat = pill.dataset.cat;
    applyFilter();
  });

  function applyFilter() {
    var visible = 0;
    cards.forEach(function(card) {
      var catMatch = !activeCat || card.dataset.cat === activeCat;
      var searchMatch = !searchTerm || card.dataset.search.indexOf(searchTerm) !== -1;
      var show = catMatch && searchMatch;
      card.classList.toggle('hidden', !show);
      if (show) visible++;
    });
    noResults.style.display = visible === 0 ? 'block' : 'none';
    updateCount();
  }

  function updateCount() {
    var visible = cards.filter(function(c) { return !c.classList.contains('hidden'); }).length;
    document.getElementById('modCount').textContent =
      visible === MODIFIERS.length
        ? MODIFIERS.length + ' modifiers'
        : visible + ' of ' + MODIFIERS.length + ' modifiers';
  }

  var selectedCard = null;

  function selectModifier(m, card) {
    if (selectedCard) selectedCard.classList.remove('selected');
    selectedCard = card;
    card.classList.add('selected');

    document.getElementById('modifierId').value = m.id;
    document.getElementById('modValue').value = m.vanilla_value;
    document.getElementById('vanillaVal').textContent = m.vanilla_value;
    document.getElementById('valueHint').textContent = m.value_hint || '';
    document.getElementById('detailTitle').textContent = m.label;
    document.getElementById('detailCat').textContent = m.category;
    document.getElementById('detailTarget').textContent =
      m.target_name + '.' + m.property_name + ' (' + m.xml_file + ')';
    document.getElementById('modDisplayName').value = m.label;
    document.getElementById('modDescription').value = m.description || '';

    var detail = document.getElementById('modDetail');
    detail.classList.add('visible');
    detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    if (window.lucide) window.lucide.createIcons();
  }

  document.getElementById('dismissDetail').addEventListener('click', function() {
    document.getElementById('modDetail').classList.remove('visible');
    if (selectedCard) { selectedCard.classList.remove('selected'); selectedCard = null; }
