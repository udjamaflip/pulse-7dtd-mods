<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{% block title %}7DtD Mod Maker{% endblock %}</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  {% if embedded %}<style>.topbar { display: none !important; }</style>{% endif %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #0f1117;
      --surface:     #1a1d26;
      --surface2:    #22263a;
      --border:      #2e3250;
      --text:        #e2e5f0;
      --text-muted:  #7a82a8;
      --accent:      #4f8ef7;
      --accent-hover:#6fa0ff;
      --accent-bg:   rgba(79,142,247,.13);
      --success:     #0e9;
      --success-bg:  rgba(0,238,153,.12);
      --warn:        #fa0;
      --warn-bg:     rgba(255,170,0,.12);
      --error:       #f05;
      --error-bg:    rgba(255,0,85,.12);
      --radius:      8px;
      --radius-sm:   6px;
      --font:        'Inter','Segoe UI',system-ui,sans-serif;
      --nav-h:       48px;
    }
    html { font-size: 15px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }

    /* ---- Topbar ---- */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      height: var(--nav-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 20px; gap: 4px;
    }
    .brand {
      font-weight: 700; font-size: 14px; color: var(--text);
      letter-spacing: .02em; text-decoration: none;
      flex-shrink: 0; margin-right: 14px; display: flex; align-items: center; gap: 8px;
    }
    .brand:hover { text-decoration: none; color: var(--text); }
    .brand-icon { color: var(--accent); display: flex; align-items: center; }
    .nav-pills { display: flex; align-items: center; gap: 2px; flex: 1; }
    .nav-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      text-decoration: none;
      transition: background .12s, color .12s;
      white-space: nowrap;
    }
    .nav-pill:hover { background: var(--surface2); color: var(--text); text-decoration: none; }
    .nav-pill.active { background: var(--surface2); color: var(--text); font-weight: 600; }
    .nav-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    /* How To link always visible even when embedded is suppressed on full nav */
    .nav-howto-icon {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 8px; border-radius: var(--radius-sm);
      font-size: 12px; color: var(--text-muted); text-decoration: none;
      border: 1px solid var(--border); background: transparent;
      transition: background .12s, color .12s;
    }
    .nav-howto-icon:hover { background: var(--surface2); color: var(--text); text-decoration: none; }

    /* ---- Layout ---- */
    .page { max-width: 860px; margin: 0 auto; padding: 28px 20px 64px; }
    .page-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .page-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: var(--text-muted); }

    /* ---- Cards ---- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }
    .card + .card { margin-top: 12px; }
    .card-title {
      font-size: 12px; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
    }

    /* ---- Buttons ---- */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      font-size: 13.5px; font-weight: 500; cursor: pointer;
      text-decoration: none; font-family: var(--font); line-height: 1.4;
      transition: background .12s, border-color .12s;
    }
    .btn:hover { background: var(--surface2); text-decoration: none; }
    .btn:disabled { opacity: .45; cursor: not-allowed; pointer-events: none; }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 12.5px; }
    .btn-danger { background: transparent; border-color: var(--border); color: var(--error); }
    .btn-danger:hover { background: var(--error-bg); }

    /* ---- Forms ---- */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
    .form-grid.cols-1 { grid-template-columns: 1fr; }
    .form-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field.span-2 { grid-column: span 2; }
    .field.span-full { grid-column: 1 / -1; }
    .field label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .field input, .field select, .field textarea {
      padding: 7px 10px; border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg); color: var(--text);
      font-size: 13.5px; font-family: var(--font);
      transition: border-color .12s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none; border-color: var(--accent);
    }
    .field-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .form-section { margin-bottom: 20px; }
    .form-section-title {
      font-size: 11px; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
    }

    /* ---- Badges / chips ---- */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600; border: 1px solid;
      white-space: nowrap;
    }
    .badge-item     { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }
    .badge-recipe   { color: var(--warn);   border-color: var(--warn);   background: var(--warn-bg); }
    .badge-block    { color: #b388ff;       border-color: #7c4dff;       background: rgba(124,77,255,.12); }
    .badge-perk     { color: var(--success); border-color: var(--success); background: var(--success-bg); }
    .badge-modifier { color: #ff8a65;       border-color: #e64a19;       background: rgba(230,74,25,.12); }
    .badge-ok       { color: var(--success); border-color: var(--success); background: var(--success-bg); }

    /* ---- Banners ---- */
    .banner {
      padding: 10px 16px; border-radius: var(--radius);
      font-size: 13.5px; font-weight: 500; border: 1px solid;
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .banner-ok   { color: var(--success); border-color: rgba(0,238,153,.3); background: var(--success-bg); }
    .banner-info { color: var(--accent);  border-color: var(--border);      background: var(--accent-bg); }
    .banner-warn { color: var(--warn);    border-color: rgba(255,170,0,.3);  background: var(--warn-bg); }

    /* ---- Misc ---- */
    .empty { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 13.5px; }
    .row   { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .mt-8  { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .mt-24 { margin-top: 24px; }
    .muted { color: var(--text-muted); font-size: 13px; }
    pre.readme-block {
      font-family: ui-monospace, 'Cascadia Code', monospace;
      font-size: 11.5px; line-height: 1.65;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px; overflow-x: auto; white-space: pre-wrap;
      color: var(--text-muted);
    }
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .page-header { flex-direction: column; }
    }

    /* ---- Cart sidebar ---- */
    .cart-panel {
      position: fixed; right: 0; top: var(--nav-h);
      width: 284px;
      height: calc(100vh - var(--nav-h));
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 90;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .22s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
    }
    .cart-panel.visible { transform: translateX(0); }
    .cart-inner {
      display: flex; flex-direction: column;
      flex: 1; min-height: 0; overflow-y: auto;
      padding: 16px;
    }
    .cart-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .cart-title {
      font-size: 13px; font-weight: 700;
      display: flex; align-items: center; gap: 6px;
    }
    .cart-badge {
      background: var(--accent); color: #fff;
      border-radius: 999px; font-size: 11px; font-weight: 700;
      padding: 1px 7px; min-width: 20px; text-align: center;
    }
    .cart-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 9px 0; border-bottom: 1px solid var(--border);
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-cat {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--accent); margin-bottom: 2px;
    }
    .cart-item-label {
      font-size: 12.5px; font-weight: 600; color: var(--text);
      line-height: 1.3; margin-bottom: 3px;
    }
    .cart-item-val {
      font-size: 11.5px; color: var(--text-muted); font-family: monospace;
    }
    .cart-empty {
      text-align: center; padding: 28px 0;
      color: var(--text-muted); font-size: 12.5px;
    }
    .summary-item {
      padding: 9px 0; border-bottom: 1px solid var(--border);
    }
    .summary-item:last-child { border-bottom: none; }
    .summary-item-label {
      font-size: 12.5px; font-weight: 600; color: var(--text); margin-bottom: 3px;
    }
    .summary-item-prop {
      font-size: 11px; color: var(--text-muted); margin-bottom: 4px;
    }
    .summary-item-val {
      font-size: 12px; font-family: monospace; color: var(--text-muted);
    }
    .nav-cart-btn {
      background: var(--accent-bg); border-color: var(--accent);
      color: var(--accent); font-size: 12.5px;
    }
    .nav-cart-btn:hover { background: var(--accent); color: #fff; text-decoration: none; }
    .nav-cart-count {
      background: var(--accent); color: #fff;
      border-radius: 999px; font-size: 10px; font-weight: 700;
      padding: 1px 6px; margin-left: 2px;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="topbar">
  <a class="brand" href="/">
    <span class="brand-icon"><i data-lucide="sword" style="width:16px;height:16px;"></i></span>
    7DtD Mod Maker
  </a>
  <div class="nav-pills">
    <a class="nav-pill {% if active_page == 'home' %}active{% endif %}" href="/">
      <i data-lucide="package" style="width:13px;height:13px;"></i>Latest Made
    </a>
    <a class="nav-pill {% if active_page == 'create' %}active{% endif %}" href="/create">
      <i data-lucide="plus-circle" style="width:13px;height:13px;"></i>New Mod
    </a>
    <a class="nav-pill {% if active_page == 'howto' %}active{% endif %}" href="/howto">
      <i data-lucide="help-circle" style="width:13px;height:13px;"></i>How To
    </a>
  </div>
  <div class="nav-right">
    <button class="btn btn-sm nav-cart-btn" id="navCartBtn" style="display:none" onclick="CartEngine.togglePanel()">
      <i data-lucide="layers" style="width:12px;height:12px;"></i>
      Build<span class="nav-cart-count" id="navCartCount">0</span>
    </button>
    <a class="nav-howto-icon" href="/howto" title="Installation guide">
      <i data-lucide="info" style="width:12px;height:12px;"></i>
    </a>
  </div>
</nav>

<main class="page">
  {% block content %}{% endblock %}
</main>

<aside class="cart-panel" id="cartPanel">
  <div class="cart-inner">
    <div class="cart-header">
      <span class="cart-title">
        <i data-lucide="layers" style="width:13px;height:13px"></i>
        Build Queue
        <span class="cart-badge" id="cartBadge">0</span>
      </span>
      <button class="btn btn-sm" onclick="CartEngine.togglePanel()" title="Hide">
        <i data-lucide="x" style="width:11px;height:11px"></i>
      </button>
    </div>

    <!-- Items view -->
    <div id="cartItemsView">
      <div id="cartItemsList"></div>
      <div id="cartEmpty" class="cart-empty">
        <i data-lucide="package-open" style="width:24px;height:24px;display:block;margin:0 auto 8px"></i>
        No mods added yet.
      </div>
      <div id="cartPackSection" style="display:none;margin-top:14px">
        <div class="field">
          <label>Pack Name</label>
          <input type="text" id="packName" placeholder="e.g. PowerSurge" value="MyModpack">
        </div>
      </div>
      <div id="cartBuildSection" style="display:none;margin-top:12px">
        <button class="btn btn-primary" style="width:100%" onclick="CartEngine.showSummary()">
          <i data-lucide="package" style="width:13px;height:13px"></i>
          Review &amp; Build
        </button>
        <button class="btn btn-sm btn-danger" style="width:100%;margin-top:6px" onclick="CartEngine.clear()">
          <i data-lucide="trash-2" style="width:11px;height:11px"></i>
          Clear All
        </button>
      </div>
    </div>

    <!-- Summary view -->
    <div id="cartSummaryView" style="display:none">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)">
        <button class="btn btn-sm" onclick="CartEngine.hideSummary()">
          <i data-lucide="arrow-left" style="width:11px;height:11px"></i>
        </button>
        <span style="font-size:13px;font-weight:700">What changes</span>
      </div>
      <div id="cartSummaryList"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:14px" id="downloadBtn" onclick="CartEngine.download()">
        <i data-lucide="download" style="width:13px;height:13px"></i>
        Accept &amp; Download
      </button>
    </div>
  </div>
</aside>

<script>lucide.createIcons();</script>
<script>
var CartEngine = (function () {
  var KEY = 'cart_7dtd_v1';
  var _open = false;

  function _load() {
    try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch (e) { return []; }
  }
  function _save(items) { localStorage.setItem(KEY, JSON.stringify(items)); }
  function _esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

function _cid(item) {
      return item.cart_id || item.modifier_id || '';
    }

    function add(item) {
      var items = _load();
      var id = _cid(item);
      if (id && items.some(function (i) { return _cid(i) === id; })) {
        return { conflict: true };
      }
      items.push(item);
      _save(items);
      render();
      showPanel();
      return { ok: true };
    }

    function removeById(mid) {
      _save(_load().filter(function (i) { return _cid(i) !== mid && i.modifier_id !== mid; }));
    hideSummary();
    render();
  }

  function clear() {
    if (!confirm('Clear all mods from build?')) return;
    _save([]);
    hideSummary();
    render();
  }

  function showPanel() {
    var p = document.getElementById('cartPanel');
    if (p) { p.classList.add('visible'); _open = true; }
    _updateNav();
  }

  function hidePanel() {
    var p = document.getElementById('cartPanel');
    if (p) { p.classList.remove('visible'); _open = false; }
    _updateNav();
  }

  function togglePanel() {
    if (_open) hidePanel(); else showPanel();
  }

  function showSummary() {
    var items = _load();
    if (!items.length) return;
    var html = items.map(function (item) {
        var valBlock;
        if (item.type === 'starter') {
          var kitRows = (item.kit_items || []).map(function (k) {
            return '<div style="font-size:12px;color:var(--text-muted);padding:1px 0">' +
              _esc(k.name) + ' &times; ' + _esc(String(k.qty || 1)) + '</div>';
          }).join('');
          valBlock = '<div style="margin-top:4px">' + (kitRows || '<em>No items</em>') + '</div>';
        } else {
          valBlock = '<div class="summary-item-val">' + _esc(String(item.vanilla_value)) +
            ' <span style="color:var(--accent)">&rarr;</span> <strong>' +
            _esc(String(item.value)) + '</strong></div>';
        }
        return '<div class="summary-item">' +
          '<div class="summary-item-label">' + _esc(item.label) + '</div>' +
          (item.type !== 'starter'
            ? '<div class="summary-item-prop"><code>' + _esc(item.target_name) + '.' +
              _esc(item.property_name) + ' &middot; ' + _esc(item.xml_file) + '</code></div>'
            : '<div style="font-size:11px;color:var(--text-muted);margin-bottom:2px">entityclasses.xml &mdash; StartItems</div>') +
          valBlock +
    document.getElementById('cartSummaryView').style.display = 'block';
    if (window.lucide) window.lucide.createIcons();
  }

  function hideSummary() {
    var iv = document.getElementById('cartItemsView');
    var sv = document.getElementById('cartSummaryView');
    if (iv) iv.style.display = 'block';
    if (sv) sv.style.display = 'none';
  }

  function download() {
    var items = _load();
    if (!items.length) { alert('No mods in build.'); return; }
    var nameEl = document.getElementById('packName');
    var packName = (nameEl ? nameEl.value.trim() : '') || 'MyModpack';
    var btn = document.getElementById('downloadBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Building\u2026'; }
    fetch('/build/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: items, pack_name: packName })
    }).then(function (r) {
      if (!r.ok) {
        return r.text().then(function (t) {
          alert('Build failed: ' + t);
          _resetDownloadBtn(btn);
        });
      }
      return r.blob().then(function (blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = packName + '.zip';
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = '<i data-lucide="check" style="width:13px;height:13px"></i> Downloaded!';
          if (window.lucide) window.lucide.createIcons();
          setTimeout(function () { _resetDownloadBtn(btn); }, 3000);
        }
      });
    }).catch(function (e) {
      alert('Error: ' + e.message);
      _resetDownloadBtn(btn);
    });
  }

  function _resetDownloadBtn(btn) {
    if (!btn) return;
    btn.disabled = false;
    btn.innerHTML = '<i data-lucide="download" style="width:13px;height:13px"></i> Accept &amp; Download';
    if (window.lucide) window.lucide.createIcons();
  }

  function _updateNav() {
    var nb = document.getElementById('navCartBtn');
    var nc = document.getElementById('navCartCount');
    var items = _load();
    if (nb) nb.style.display = items.length > 0 ? 'inline-flex' : 'none';
    if (nc) nc.textContent = items.length;
  }

  function render() {
    var items = _load();
    var badge = document.getElementById('cartBadge');
    if (badge) badge.textContent = items.length;

    var listEl   = document.getElementById('cartItemsList');
    var emptyEl  = document.getElementById('cartEmpty');
    var packSec  = document.getElementById('cartPackSection');
    var buildSec = document.getElementById('cartBuildSection');

    if (!listEl) { _updateNav(); return; }

    if (items.length === 0) {
      listEl.innerHTML = '';
      if (emptyEl)  emptyEl.style.display  = 'block';
      if (packSec)  packSec.style.display  = 'none';
      if (buildSec) buildSec.style.display = 'none';
      hidePanel();
    } else {
      if (emptyEl)  emptyEl.style.display  = 'none';
      if (packSec)  packSec.style.display  = 'block';
      if (buildSec) buildSec.style.display = 'block';
      listEl.innerHTML = items.map(function (item) {
          var removeId = _cid(item) || item.modifier_id || '';
          var valDisplay = item.type === 'starter'
            ? '<em style="color:var(--text-muted);font-size:11px">' + _esc(String(item.value)) + '</em>'
            : _esc(String(item.vanilla_value)) + ' <span style="color:var(--accent)">&#8594;</span> <strong>' + _esc(String(item.value)) + '</strong>';
          return '<div class="cart-item">' +
            '<div class="cart-item-info">' +
              '<div class="cart-item-cat">' + _esc(item.category) + '</div>' +
              '<div class="cart-item-label">' + _esc(item.label) + '</div>' +
              '<div class="cart-item-val">' + valDisplay + '</div>' +
            '</div>' +
            '<button class="btn btn-sm btn-danger" style="flex-shrink:0;padding:3px 7px" ' +
              'onclick="CartEngine.removeById(\'' + _esc(removeId) + '\')" title="Remove">' +
            '<i data-lucide="x" style="width:11px;height:11px"></i>' +
          '</button>' +
        '</div>';
      }).join('');
    }
    _updateNav();
    if (window.lucide) window.lucide.createIcons();
  }

  document.addEventListener('DOMContentLoaded', function () {
    var items = _load();
    if (items.length > 0) { showPanel(); }
    render();
  });

  return {
    add: add, removeById: removeById, clear: clear,
    render: render, showPanel: showPanel, hidePanel: hidePanel, togglePanel: togglePanel,
    showSummary: showSummary, hideSummary: hideSummary, download: download
